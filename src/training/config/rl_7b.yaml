# RL / GRPO training configuration
# --------------------------------
# This file is the default Hydra config loaded by ``src.training.rl_trainer``.
# Most runs override a subset of these values from shell scripts in ``scripts/rlvr``.

# Data section:
# - train_files / val_files point at processed JSONL in the repository schema.
# - max_prompt_length and max_response_length define the sequence budget seen by
#   rollout, reward evaluation, and validation.
# - train_batch_size is the global rollout batch. When memory is tight, reduce
#   micro-batch settings first before shrinking this value.
data:
  tokenizer: null
  train_files: data/processed/train_with_sys.jsonl
  val_files: data/processed/test_with_sys.jsonl
  prompt_key: context_messages
  max_prompt_length: 4096 # Common starting point for long rubric prompts on 7B-scale models.
  max_response_length: 8192 # Large because the judge may emit long reasoning traces before the final answer tag.
  train_batch_size: 1024 # Global rollout batch; often kept large for GRPO sample efficiency.
  val_batch_size: null # DEPRECATED: Validation datasets are sent to inference engines as a whole batch, which will schedule the memory themselves
  return_raw_input_ids: False  # This should be set to true when the tokenizer between policy and rm differs
  return_raw_chat: False
  shuffle: True
  filter_overlong_prompts: True # for large-scale dataset, filtering overlong prompts could be timeconsuming. You should disable this and set `truncation='left'
  truncation: error
  image_key: images

# Actor / rollout / reference section:
# - actor: trainable policy hyperparameters
# - rollout: generation-time hyperparameters and vLLM settings
# - ref: frozen reference policy used for KL regularization
actor_rollout_ref:
  hybrid_engine: True
  model:
    path: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    external_lib: null
    override_config: { }
    enable_gradient_checkpointing: True
    use_remove_padding: True
  actor:
    strategy: fsdp  # This is for backward-compatibility
    ppo_mini_batch_size: 128 # A common GRPO default; usually a divisor of the global train batch.
    ppo_micro_batch_size: null # will be deprecated, use ppo_micro_batch_size_per_gpu
    ppo_micro_batch_size_per_gpu: 4 # First knob to lower when you hit OOM during optimization.
    use_dynamic_bsz: False # Keep off unless you specifically need token-based variable batch sizing.
    ppo_max_token_len_per_gpu: 16384 # Upper bound on tokens consumed by one PPO step per GPU.
    grad_clip: 1.0 # Standard stability default for PPO-style training.
    clip_ratio: 0.2 # Canonical PPO clipping value.
    entropy_coeff: 0.001 # Often set to 0 or near-0 for judge-style GRPO runs.
    use_kl_loss: True # GRPO commonly keeps KL on to prevent policy drift.
    use_torch_compile: True # False to disable torch compile
    kl_loss_coef: 0.001 # Small KL penalty is a common default; raise it to constrain the policy more strongly.
    kl_loss_type: low_var_kl # for grpo
    ppo_epochs: 1 # One epoch is the usual on-policy default.
    shuffle: False # On-policy updates usually keep rollout order fixed within an update.
    ulysses_sequence_parallel_size: 1 # sp size
    optim:
      lr: 1e-6 # Typical full-parameter RL fine-tuning learning rate on 7B-scale models.
      lr_warmup_steps: -1 # Prioritized. Negative values mean delegating to lr_warmup_steps_ratio.
      lr_warmup_steps_ratio: 0.  # the total steps will be injected during runtime
      min_lr_ratio: null   # only useful for warmup with cosine
      warmup_style: constant  # select from constant/cosine
      total_training_steps: -1  # must be override by program
    fsdp_config:
      wrap_policy:
        # transformer_layer_cls_to_wrap: None
        min_num_params: 0
      param_offload: False
      optimizer_offload: False
      fsdp_size: -1
  ref:
    fsdp_config:
      param_offload: False
      wrap_policy:
        # transformer_layer_cls_to_wrap: None
        min_num_params: 0
    log_prob_micro_batch_size: null # will be deprecated, use log_prob_micro_batch_size_per_gpu
    log_prob_micro_batch_size_per_gpu: 8
    log_prob_use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${actor_rollout_ref.actor.ppo_max_token_len_per_gpu}
    ulysses_sequence_parallel_size: ${actor_rollout_ref.actor.ulysses_sequence_parallel_size} # sp size
  rollout:
    name: vllm
    temperature: 1.0 # Training rollout usually keeps sampling stochastic rather than greedy.
    top_k: -1 # 0 for hf rollout, -1 for vllm rollout
    top_p: 1
    use_fire_sampling: False # https://arxiv.org/abs/2410.21236
    prompt_length: ${data.max_prompt_length}  # not use for opensource
    response_length: ${data.max_response_length}
    # for vllm rollout
    dtype: bfloat16 # should align with FSDP
    gpu_memory_utilization: 0.5 # Conservative default; increase gradually if vLLM leaves memory unused.
    ignore_eos: False
    enforce_eager: False
    free_cache_engine: False
    load_format: dummy_dtensor
    tensor_model_parallel_size: 4 # Match this to the planned inference parallelism of the rollout engine.
    max_num_batched_tokens: 8192 # Throughput / memory tradeoff for vLLM scheduling.
    max_model_len: null
    max_num_seqs: 1024
    log_prob_micro_batch_size: null # will be deprecated, use log_prob_micro_batch_size_per_gpu
    log_prob_micro_batch_size_per_gpu: 8
    log_prob_use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${actor_rollout_ref.actor.ppo_max_token_len_per_gpu}
    disable_log_stats: True
    enable_chunked_prefill: False # may get higher throughput when set to True. When activated, Please increase max_num_batched_tokens or decrease max_model_len.
    # for hf rollout
    do_sample: True
    # number of responses (i.e. num sample times)
    n: 7 # GRPO typically needs multiple sampled responses per prompt.
    val_kwargs:
      # sampling parameters for validation
      top_k: -1 # 0 for hf rollout, -1 for vllm rollout
      top_p: 1.0
      temperature: 0
      n: 1
      do_sample: False # default eager for validation

# Critic section:
# Controls the value model used to estimate advantages. Learning rates are often
# slightly higher than the actor because the critic is fitting a supervised-ish
# regression target during RL.
critic:
  strategy: fsdp
  optim:
    lr: 1e-5 # Often higher than actor lr; critic usually needs to adapt faster.
    lr_warmup_steps_ratio: 0.  # the total steps will be injected during runtime
    min_lr_ratio: null   # only useful for warmup with cosine
    warmup_style: constant  # select from constant/cosine
    total_training_steps: -1  # must be override by program
  model:
    path: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    tokenizer_path: ${actor_rollout_ref.model.path}
    override_config: { }
    external_lib: ${actor_rollout_ref.model.external_lib}
    enable_gradient_checkpointing: True
    use_remove_padding: False
    fsdp_config:
      param_offload: False
      optimizer_offload: False
      wrap_policy:
        # transformer_layer_cls_to_wrap: None
        min_num_params: 0
      fsdp_size: -1
  ppo_mini_batch_size: ${actor_rollout_ref.actor.ppo_mini_batch_size}
  ppo_micro_batch_size: null # will be deprecated, use ppo_micro_batch_size_per_gpu
  ppo_micro_batch_size_per_gpu: null
  forward_micro_batch_size: ${critic.ppo_micro_batch_size}
  forward_micro_batch_size_per_gpu: ${critic.ppo_micro_batch_size_per_gpu}
  use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}
  ppo_max_token_len_per_gpu: 32768 # Critic often needs a larger token budget because it sees prompt + response together.
  forward_max_token_len_per_gpu: ${critic.ppo_max_token_len_per_gpu}
  ulysses_sequence_parallel_size: 1 # sp size
  ppo_epochs: ${actor_rollout_ref.actor.ppo_epochs}
  shuffle: ${actor_rollout_ref.actor.shuffle}
  grad_clip: 1.0
  cliprange_value: 0.5

# Reward model section:
# Disabled by default because this repository currently uses a simple rule-based
# reward callback. Enable only when switching to a learned reward model.
reward_model:
  enable: False
  strategy: fsdp
  model:
    input_tokenizer: ${actor_rollout_ref.model.path}  # set this to null if the chat template is identical
    path: ~/models/FsfairX-LLaMA3-RM-v0.1
    external_lib: ${actor_rollout_ref.model.external_lib}
    use_remove_padding: False
    fsdp_config:
      wrap_policy:
        min_num_params: 0
      param_offload: False
      fsdp_size: -1
  micro_batch_size: null # will be deprecated, use micro_batch_size_per_gpu
  micro_batch_size_per_gpu: null # set a number
  max_length: null
  ulysses_sequence_parallel_size: 1 # sp size
  use_dynamic_bsz: ${critic.use_dynamic_bsz}
  forward_max_token_len_per_gpu: ${critic.forward_max_token_len_per_gpu}
  reward_manager: naive

# Custom reward section:
# ``path`` and ``name`` together tell ``src.training.rl_trainer`` which Python
# callable to import dynamically at runtime.
custom_reward_function:
  path: src/reward/base_reward.py
  name: lm_as_judge_match

# Algorithm section:
# ``adv_estimator=grpo`` is the key behavior switch that makes this config a
# GRPO-style run rather than a vanilla PPO setup.
algorithm:
  gamma: 1.0
  lam: 1.0
  adv_estimator: grpo
  kl_penalty: kl  # how to estimate kl divergence
  kl_ctrl:
    type: fixed
    kl_coef: 0.0

# Trainer section:
# High-level run controls such as epoch count, GPU count, save frequency, and
# output directory layout.
trainer:
  balance_batch: True
  val_before_train: False
  total_epochs: 10 # Shell scripts often override this downward for smoke tests.
  total_training_steps: null
  project_name: FinRAG-GRPO
  experiment_name: rlvr_local
  logger: [ 'console', 'wandb' ]
  val_generations_to_log_to_wandb: 0
  nnodes: 1
  n_gpus_per_node: 8 # Must match the actual machine or the launch script override.
  save_freq: -1
  # auto: find the last ckpt to resume. If can't find, start from scratch
  resume_mode: auto # or auto or resume_path if
  resume_from_path: False
  test_freq: -1
  critic_warmup: 0
  default_hdfs_dir: null
  remove_previous_ckpt_in_save: False
  del_local_ckpt_after_load: False
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}
